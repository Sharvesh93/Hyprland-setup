source = ~/.config/matugen/generated/hyprlock.conf

$fn_greet = echo "<i> Hi $USER :) </i>"
$wall = ~/.config/hypr/themes/wallpaper

general {
    no_fade_in = true
    grace = 1
    disable_loading_bar = false
    hide_cursor = true
    ignore_empty_input = true
    text_trim = true
}

background {
    monitor =
    path = $wall

    blur_passes = 2
    contrast = 0.8916
    brightness = 0.7172
    vibrancy = 0.1696
    vibrancy_darkness = 0
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H')"

    color = $primary

    shadow_size = 3
    shadow_color = rgb(000000)

    shadow_boost = 1.2

    font_size = 150
    font_family = AlfaSlabOne

    position = 0, -250

    halign = center
    valign = top

    zindex = 5
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%M')"

    color = $secondary

    shadow_size = 3
    shadow_color = rgb(000000)

    shadow_boost = 1.2

    font_size = 150
    font_family = AlfaSlabOne

    position = 0, -420

    halign = center
    valign = top

    zindex = 5
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%d %b %A')"

    color = $text_secondary

    font_size = 14
    font_family = JetBrainsMono Nerd Font Mono ExtraBold

    position = 0, -130

    halign = center
    valign = center

    zindex = 5
}

input-field {
    monitor =

    size = 250,60

    outline_thickness = 2

    outer_color = $outline
    inner_color = $surface

    font_color = $text

    dots_size = 0.12
    dots_spacing = 0.35
    dots_center = true

    fade_on_empty = true

    placeholder_text = <i>Password</i>

    hide_input = false

    position = 0,-370

    halign = center
    valign = center

    zindex = 20
}

label {
    monitor =

    text = cmd[update:60000] $fn_greet

    color = $text

    font_size = 17
    font_family = JetBrainsMono Nerd Font Mono

    position = 0,-250

    halign = center
    valign = center

    zindex = 5
}
